services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: tams-sqlserver
    hostname: hostname-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
volumes:
  sqlserver_data: